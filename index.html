<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App - Weatherstack Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --fg: #e7ebff;
      --sub: #a9b1d6;
      --pri: #6da8ff;
      --pri2: #7cf0ff;
      --err: #ff6d6d;
      --warn: #ffd36d;
      --ok: #66e2a2;
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.12);
      --blur: 16px;
      --radius: 18px;
      --border: 1px solid rgba(255,255,255,0.18);
      --shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    html, body { height: 100%; }
    body {
      margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100vh; overflow-x: hidden;
    }

    /* Background */
    .bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
    .bg .gradient { position: absolute; filter: blur(80px); opacity: 0.55; }
    .bg .gradient { width: 50vmax; height: 50vmax; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--pri), transparent 60%); top: -10vmax; left: -10vmax; }
    .bg .gradient.g2 { width: 60vmax; height: 60vmax; background: radial-gradient(circle at 70% 70%, var(--pri2), transparent 55%); bottom: -15vmax; right: -10vmax; }
    .bg .noise { position: absolute; inset: -100px; opacity: 0.035; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.6"/></svg>'); background-size: 300px; }

    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

    .glass { background: var(--glass); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); border-radius: var(--radius); border: var(--border); box-shadow: var(--shadow); }

    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; }
    .brand { display: flex; gap: 10px; align-items: center; color: var(--pri2); }
    .brand h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: .4px; }

    .quick-actions { display: flex; gap: 10px; align-items: center; }

    .controls { margin-top: 18px; padding: 16px; display: grid; gap: 14px; }

    .field-group { display: grid; gap: 6px; }
    label { color: var(--sub); font-size: 12px; letter-spacing: .3px; }
    input, select { height: 40px; border-radius: 12px; border: var(--border); padding: 0 12px; background: rgba(255,255,255,0.06); color: var(--fg); outline: none; }
    input::placeholder { color: #cfd6ff88; }

    .tabs { display: inline-flex; gap: 8px; background: var(--glass-strong); padding: 6px; border-radius: 12px; border: var(--border); width: max-content; }
    .tab { height: 36px; padding: 0 12px; border-radius: 10px; border: none; color: var(--fg); background: transparent; cursor: pointer; }
    .tab.active { background: rgba(255,255,255,0.16); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }

    .tab-panels .panel { display: none; }
    .tab-panels .panel.active { display: block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }

    .btn { height: 42px; padding: 0 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); color: var(--fg); background: rgba(255,255,255,0.08); cursor: pointer; }
    .btn.pri { background: linear-gradient(135deg, rgba(109,168,255,0.6), rgba(124,240,255,0.45)); border-color: rgba(255,255,255,0.28); }
    .btn:active { transform: translateY(1px); }

    .link { color: var(--pri2); text-decoration: none; }

    .status { margin-top: 14px; padding: 12px 14px; font-size: 14px; color: var(--sub); }
    .status.info {}
    .status.success { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .status.error { color: var(--err); }

    .results { margin-top: 16px; display: grid; gap: 16px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }

    .card { padding: 16px; display: grid; gap: 12px; position: relative; overflow: hidden; }
    .card-h { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-h h3 { margin: 0; font-size: 18px; }
    .card-h .sub { color: var(--sub); font-size: 12px; }
    .card .icon { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35)); }

    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .metric { text-align: center; }
    .metric .val { font-size: 22px; font-weight: 700; letter-spacing: .4px; }
    .metric .lab { color: var(--sub); font-size: 12px; }

    .desc { color: var(--sub); }

    .hist { display: grid; gap: 10px; }
    .hist .day { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; border: var(--border); }
    .hist .date { font-weight: 600; }
    .hist .summary { color: var(--sub); font-size: 12px; margin-top: 4px; }
    .hours { display: grid; gap: 8px; margin-top: 8px; }
    .hItem { display: grid; grid-template-columns: 60px 1fr 2fr; gap: 8px; align-items: center; }
    .hItem .time { color: var(--sub); font-size: 12px; }

    .raw { padding: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; overflow: auto; max-height: 40vh; }

    .footer { margin: 18px 0 40px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
    .toggles { display: flex; gap: 16px; align-items: center; }
    .switch { display: flex; gap: 8px; align-items: center; font-size: 14px; color: var(--sub); }

    /* Suggestions & Select Fixes */
    .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #131b2e; border: var(--border); border-radius: 12px; margin-top: 4px; z-index: 100; overflow: hidden; box-shadow: var(--shadow); display: none; max-height: 300px; overflow-y: auto; }
    .suggestions.show { display: block; }
    .suggestion-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; font-size: 14px; display: flex; align-items: center; gap: 12px; }
    .suggestion-item:hover, .suggestion-item.selected { background: rgba(255,255,255,0.1); }
    .suggestion-icon { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: var(--sub); }
    
    .btn-clear {
      position: absolute; right: 36px; bottom: 0; width: 36px; height: 40px;
      background: transparent; border: none; color: var(--sub);
      font-size: 24px; cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 10;
    }
    .btn-clear:hover { color: var(--fg); }
    .btn-clear.show { display: flex; }
    #query { padding-right: 76px; }

    .btn-expand {
      position: absolute; right: 0; bottom: 0; width: 36px; height: 40px;
      background: transparent; border: none; color: var(--sub);
      cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9;
    }
    .btn-expand:hover { color: var(--fg); }

    .recent-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 11px; color: var(--sub); background: rgba(255,255,255,0.03); }
    .btn-text { background: none; border: none; color: var(--sub); cursor: pointer; font-size: 11px; padding: 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-text:hover { color: var(--err); }

    select {
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a9b1d6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 36px; cursor: pointer;
    }
    select option { background: var(--bg); color: var(--fg); padding: 10px; }

    @media (max-width: 640px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="gradient"></div>
    <div class="gradient g2"></div>
    <div class="noise"></div>
  </div>

  <main class="container">
    <header class="app-header glass">
      <div class="brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 12h9V3"/></svg>
        <h1>Weather App</h1>
      </div>
      <div class="quick-actions">
        <button id="btn-geolocate" class="btn pri">Use My Location</button>
        <a class="link" href="https://weatherstack.com/documentation" target="_blank" rel="noopener">API Docs</a>
      </div>
    </header>

    <section class="controls glass">
      <div class="field-group" style="position: relative;">
        <label for="query">Location</label>
        <input id="query" type="text" placeholder="e.g., London, New York" autocomplete="off" />
        <button id="clear-query" class="btn-clear" aria-label="Clear" title="Clear search">&times;</button>
        <button id="expand-query" class="btn-expand" aria-label="Show suggestions" title="Show suggestions">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="tabs" role="tablist" aria-label="Data type">
        <button class="tab active" role="tab" aria-selected="true" data-tab="current">Current</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="historical">Historical</button>
        <button class="tab" role="tab" aria-selected="false" data-tab="marine">Marine</button>
      </div>

      <div class="tab-panels">
        <div class="panel active" data-panel="current">
          <div class="grid">
            <div class="field-group">
              <label>Units</label>
              <select id="units-current">
                <option value="m">Metric (C, km/h)</option>
                <option value="f">Imperial (F, mph)</option>
                <option value="s">Scientific (K, m/s)</option>
              </select>
            </div>
          </div>
          <button id="fetch-current" class="btn pri">Fetch Current Weather</button>
        </div>

        <div class="panel" data-panel="historical">
          <div class="grid">
            <div class="field-group">
              <label for="start-date">Start Date</label>
              <input id="start-date" type="date" />
            </div>
            <div class="field-group">
              <label for="end-date">End Date</label>
              <input id="end-date" type="date" />
            </div>
            <div class="field-group">
              <label>Hourly Interval</label>
              <select id="hourly">
                <option value="1">1h</option>
                <option value="3">3h</option>
                <option value="6">6h</option>
              </select>
            </div>
            <div class="field-group">
              <label>Units</label>
              <select id="units-hist">
                <option value="m">Metric (C, km/h)</option>
                <option value="f">Imperial (F, mph)</option>
                <option value="s">Scientific (K, m/s)</option>
              </select>
            </div>
          </div>
          <button id="fetch-historical" class="btn pri">Fetch Historical Weather</button>
        </div>

        <div class="panel" data-panel="marine">
          <div class="grid">
            <div class="field-group">
              <label for="marine-date">Date</label>
              <input id="marine-date" type="date" />
            </div>
            <div class="field-group">
              <label>Hourly Interval</label>
              <select id="marine-hourly">
                <option value="1">1h</option>
                <option value="3">3h</option>
                <option value="6">6h</option>
              </select>
            </div>
            <div class="field-group">
              <label>Units</label>
              <select id="units-marine">
                <option value="m">Metric (C, km/h)</option>
                <option value="f">Imperial (F, mph)</option>
                <option value="s">Scientific (K, m/s)</option>
              </select>
            </div>
          </div>
          <button id="fetch-marine" class="btn pri">Fetch Marine Weather</button>
        </div>
      </div>
    </section>

    <section id="status" class="status glass" aria-live="polite"></section>

    <section id="results" class="results">
      <div id="cards" class="cards"></div>
      <pre id="raw" class="raw glass" hidden></pre>
    </section>

    <footer class="footer glass">
      <div>
        Data by <a class="link" href="https://weatherstack.com/" target="_blank" rel="noopener">Weatherstack</a>
      </div>
      <div class="toggles">
        <label class="switch"><input id="toggle-raw" type="checkbox"/> <span>Show Raw JSON</span></label>
      </div>
    </footer>
  </main>

  <script>
    const API_KEY = '7a581bd28aa96b107cdf40bbd6b6a886';
    const BASE = 'http://api.weatherstack.com';
    let locationsList = [];

    // Utilities
    const qs = (sel, el=document) => el.querySelector(sel);
    const qsa = (sel, el=document) => Array.from(el.querySelectorAll(sel));

    function setStatus(msg, type='info') {
      const el = qs('#status');
      el.textContent = msg || '';
      el.className = `status glass ${type}`;
    }

    function buildURL(endpoint, params) {
      const url = new URL(BASE + endpoint);
      url.searchParams.set('access_key', API_KEY);
      for (const [k, v] of Object.entries(params || {})) {
        if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
      }
      return url.toString();
    }

    function locFromInput() {
      const v = qs('#query').value.trim();
      return v || undefined;
    }

    async function loadLocations() {
      try {
        const res = await fetch('locations.txt');
        const text = await res.text();
        locationsList = text.split('\n').map(l => l.trim()).filter(l => l);
      } catch (e) { console.warn('Could not load locations.txt', e); }
    }

    function getRecents() {
      try { 
        const r = JSON.parse(localStorage.getItem('weather_recents') || '[]');
        // Normalize old string-only format to objects
        return r.map(i => typeof i === 'string' ? { query: i, icon: null } : i);
      } catch { return []; }
    }

    function addToRecents(query, icon = null) {
      if (!query) return;
      let recents = getRecents();
      recents = recents.filter(r => r.query.toLowerCase() !== query.toLowerCase());
      recents.unshift({ query, icon });
      if (recents.length > 5) recents.pop();
      localStorage.setItem('weather_recents', JSON.stringify(recents));
    }

    async function geolocateToInput() {
      setStatus('Resolving your location…');
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          setStatus('Geolocation not supported by this browser', 'warn');
          resolve();
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            const val = `${latitude.toFixed(4)},${longitude.toFixed(4)}`;
            qs('#query').value = val;
            qs('#clear-query').classList.add('show');
            setStatus(`Using current location: ${val}`, 'success');
            resolve(val);
          },
          (err) => {
            setStatus('Location permission denied or unavailable', 'error');
            resolve();
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
        );
      });
    }

    function renderCard(html) {
      const c = document.createElement('div');
      c.className = 'card glass';
      c.innerHTML = html;
      qs('#cards').prepend(c);
    }

    function renderRaw(obj) {
      const raw = qs('#raw');
      raw.textContent = JSON.stringify(obj, null, 2);
    }

    function toggleRawVisible(show) {
      const raw = qs('#raw');
      raw.hidden = !show;
    }

    function handleApiError(payload) {
      if (payload && payload.error) {
        const { code, type, info } = payload.error;
        throw new Error(`${code} ${type}: ${info}`);
      }
    }

    async function fetchJSON(url) {
      const res = await fetch(url);
      const data = await res.json();
      handleApiError(data);
      return data;
    }

    // Current Weather
    async function getCurrent() {
      const query = locFromInput();
      if (!query) return setStatus('Enter a location (city, address, or lat,long)', 'warn');
      const units = qs('#units-current').value;
      const url = buildURL('/current', { query, units });
      setStatus('Loading current weather…');
      const data = await fetchJSON(url);
      renderRaw(data);

      const { location, current } = data;
      addToRecents(query, (current.weather_icons || [])[0]);
      renderCard(`
        <header class="card-h">
          <div>
            <h3>${location.name}, ${location.region || location.country}</h3>
            <div class="sub">${location.localtime}</div>
          </div>
          <img class="icon" src="${(current.weather_icons||[])[0]||''}" alt="icon"/>
        </header>
        <div class="metrics">
          <div class="metric"><div class="val">${current.temperature}°</div><div class="lab">Temp</div></div>
          <div class="metric"><div class="val">Feels ${current.feelslike}°</div><div class="lab">Feels</div></div>
          <div class="metric"><div class="val">${current.humidity}%</div><div class="lab">Humidity</div></div>
          <div class="metric"><div class="val">${current.wind_speed} ${units==='m'?'km/h':units==='f'?'mph':'m/s'}</div><div class="lab">Wind</div></div>
        </div>
        <div class="desc">${(current.weather_descriptions||[]).join(', ')}</div>
      `);
      setStatus('Current weather loaded', 'success');
    }

    // Historical Weather
    async function getHistorical() {
      const query = locFromInput();
      if (!query) return setStatus('Enter a location first', 'warn');
      const date = qs('#start-date').value;
      const end_date = qs('#end-date').value || undefined;
      if (!date) return setStatus('Pick a start date', 'warn');
      const hourly = qs('#hourly').value;
      const units = qs('#units-hist').value;
      const url = buildURL('/historical', { query, historical_date: date, historical_date_end: end_date, hourly, units });
      setStatus('Loading historical weather…');
      const data = await fetchJSON(url);
      addToRecents(query, null); // No current icon for historical
      renderRaw(data);

      const key = end_date ? `${date}→${end_date}` : date;
      const weatherDays = data.historical || {};
      const days = Object.keys(weatherDays).sort();

      let blocks = days.map(d => {
        const day = weatherDays[d];
        const hours = (day.hourly||[]).slice(0, 8).map(h => `
          <div class="hItem">
            <div class="time">${String(h.time).padStart(4,'0').replace(/(\\d{2})(\\d{2})/,'$1:$2')}</div>
            <div class="t">${h.temperature}°</div>
            <div class="w">${(h.weather_descriptions&&h.weather_descriptions[0])||''}</div>
          </div>
        `).join('');
        return `
          <div class="day">
            <div class="date">${d}</div>
            <div class="summary">Avg ${day.avgtemp}°, Max ${day.maxtemp}°, Min ${day.mintemp}°</div>
            <div class="hours">${hours}</div>
          </div>
        `;
      }).join('');

      renderCard(`
        <header class="card-h">
          <div>
            <h3>Historical: ${key}</h3>
            <div class="sub">${data.location?.name || ''}</div>
          </div>
        </header>
        <div class="hist">${blocks}</div>
      `);
      setStatus('Historical weather loaded', 'success');
    }

    // Marine Weather
    async function getMarine() {
      const query = locFromInput();
      if (!query) return setStatus('Enter a location first. Marine works best with lat,long.', 'warn');
      const date = qs('#marine-date').value;
      if (!date) return setStatus('Pick a date for marine data', 'warn');
      const hourly = qs('#marine-hourly').value;
      const units = qs('#units-marine').value;
      const url = buildURL('/marine', { query, hourly, date, units });
      setStatus('Loading marine weather…');
      const data = await fetchJSON(url);
      addToRecents(query, null); // No current icon for marine
      renderRaw(data);

      const marine = data.marine || {};
      const loc = data.request?.query || query;

      const hours = (marine.hourly || []).slice(0, 8).map(h => `
        <div class="hItem">
          <div class="time">${String(h.time).padStart(4,'0').replace(/(\\d{2})(\\d{2})/,'$1:$2')}</div>
          <div class="t">Sea ${(h.sig_ht_mt ?? h.sig_ht_ft ?? '-')} ${units==='m'?'m':'ft'}</div>
          <div class="w">Swell ${(h.swell_ht_mt ?? h.swell_ht_ft ?? '-')} ${units==='m'?'m':'ft'} @ ${(h.swell_pd_s ?? '-')}s</div>
          <div class="w">Wind ${(h.windspeed_kmph ?? h.windspeed_mph ?? '-')} ${units==='m'?'km/h':units==='f'?'mph':'m/s'}</div>
        </div>
      `).join('');

      renderCard(`
        <header class="card-h">
          <div>
            <h3>Marine: ${loc}</h3>
            <div class="sub">${date}</div>
          </div>
        </header>
        <div class="hist">${hours}</div>
      `);
      setStatus('Marine weather loaded', 'success');
    }

    // Tabs
    function setupTabs() {
      qsa('.tab').forEach(tab => tab.addEventListener('click', () => {
        const id = tab.dataset.tab;
        qsa('.tab').forEach(t => t.classList.toggle('active', t===tab));
        qsa('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel===id));
      }));
    }

    // Autocomplete
    function setupAutocomplete() {
      const input = qs('#query');
      const list = qs('#suggestions');
      const clearBtn = qs('#clear-query');
      const expandBtn = qs('#expand-query');
      let timer;

      const attachClicks = () => {
        qsa('.suggestion-item', list).forEach(el => el.addEventListener('click', () => {
          input.value = el.dataset.val;
          clearBtn.classList.add('show');
          list.classList.remove('show');
          const active = qs('.tab.active').dataset.tab;
          if (active === 'current') getCurrent().catch(e => setStatus(e.message, 'error'));
          if (active === 'historical') getHistorical().catch(e => setStatus(e.message, 'error'));
          if (active === 'marine') getMarine().catch(e => setStatus(e.message, 'error'));
        }));
      };

      const showRecents = () => {
        const recents = getRecents();
        if (!recents.length) {
          list.innerHTML = '<div class="suggestion-item" style="cursor:default; color:var(--sub);">No recent searches</div>';
        } else {
          list.innerHTML = `
            <div class="recent-header">
              <span style="text-transform:uppercase; letter-spacing:1px;">Recent Searches</span>
              <button id="clear-recents" class="btn-text">Clear</button>
            </div>
          ` + recents.map(r => `
            <div class="suggestion-item" data-val="${r.query}">
              ${r.icon ? `<img src="${r.icon}" class="suggestion-icon" alt="weather" />` : `<div class="suggestion-icon">🕒</div>`}
              <span>${r.query}</span>
            </div>
          `).join('');
        }
        list.classList.add('show');
        
        const clearBtn = qs('#clear-recents', list);
        if (clearBtn) {
          clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            localStorage.removeItem('weather_recents');
            list.classList.remove('show');
          });
        }
        attachClicks();
      };

      const renderSuggestions = (matches) => {
        if (!matches.length) return;
        list.innerHTML = matches.map(loc => {
          return `
            <div class="suggestion-item" data-val="${loc}">
              <div class="suggestion-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div>
              <strong>${loc}</strong>
            </div>
          `;
        }).join('');
        list.classList.add('show');
        attachClicks();
      };

      if (input.value.trim()) clearBtn.classList.add('show');

      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.remove('show');
        list.classList.remove('show');
        input.focus();
      });

      expandBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (list.classList.contains('show')) {
          list.classList.remove('show');
          return;
        }
        input.focus();
        const val = input.value.trim();
        const matches = val ? locationsList.filter(loc => loc.toLowerCase().includes(val.toLowerCase())) : locationsList;
        if (matches.length) renderSuggestions(matches);
        else if (!val) showRecents();
      });

      input.addEventListener('focus', () => {
        if (!input.value.trim()) showRecents();
      });

      input.addEventListener('keydown', (e) => {
        if (!list.classList.contains('show')) return;
        const items = qsa('.suggestion-item', list);
        if (!items.length) return;

        let idx = items.findIndex(el => el.classList.contains('selected'));

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          idx = (idx + 1) % items.length;
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (idx === -1) idx = items.length - 1;
          else idx = (idx - 1 + items.length) % items.length;
        } else if (e.key === 'Enter' && idx >= 0) {
          e.preventDefault();
          e.stopImmediatePropagation();
          items[idx].click();
          return;
        } else if (e.key === 'Escape') {
          list.classList.remove('show');
          return;
        } else return;

        items.forEach(el => el.classList.remove('selected'));
        items[idx].classList.add('selected');
        items[idx].scrollIntoView({ block: 'nearest' });
      });

      input.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val) {
          clearBtn.classList.add('show');
        } else {
          clearBtn.classList.remove('show');
          showRecents();
          return;
        }

        clearTimeout(timer);
        list.classList.remove('show');
        if (val.length < 3) return;

        timer = setTimeout(async () => {
          const matches = locationsList.filter(loc => loc.toLowerCase().includes(val.toLowerCase())).slice(0, 10);
          renderSuggestions(matches);
        }, 200);
      });
      
      document.addEventListener('click', (e) => { if (!e.target.closest('.field-group')) list.classList.remove('show'); });
    }

    // Events
    function setupEvents() {
      qs('#btn-geolocate').addEventListener('click', geolocateToInput);
      qs('#fetch-current').addEventListener('click', () => getCurrent().catch(e => setStatus(e.message, 'error')));
      qs('#fetch-historical').addEventListener('click', () => getHistorical().catch(e => setStatus(e.message, 'error')));
      qs('#fetch-marine').addEventListener('click', () => getMarine().catch(e => setStatus(e.message, 'error')));
      qs('#toggle-raw').addEventListener('change', (e) => toggleRawVisible(e.target.checked));

      // Submit on Enter
      qs('#query').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const active = qs('.tab.active').dataset.tab;
          if (active === 'current') getCurrent().catch(e => setStatus(e.message, 'error'));
          if (active === 'historical') getHistorical().catch(e => setStatus(e.message, 'error'));
          if (active === 'marine') getMarine().catch(e => setStatus(e.message, 'error'));
        }
      });
    }

    // Init
    (function init() {
      setupTabs();
      loadLocations();
      setupAutocomplete();
      setupEvents();
      // Suggest geolocation on load (non-blocking)
      if (!qs('#query').value) geolocateToInput();
    })();
  </script>
</body>
</html>
